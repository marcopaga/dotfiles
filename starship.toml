# starship.toml — Catppuccin Mocha palette, two-line prompt
# Symlink: ln -s ~/Projects/dotfiles/starship.toml ~/.config/starship.toml

palette = "catppuccin_mocha"

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$ruby\
$golang\
$rust\
$java\
$kubernetes\
$cmd_duration\
$line_break\
$status\
$character"""

# === Directory ===
[directory]
style = "bold lavender"
truncation_length = 4
truncate_to_repo = true

# === Git ===
[git_branch]
format = "on [$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold mauve"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold peach"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

# === Language versions (only shown when relevant file detected) ===
[nodejs]
format = "via [$symbol($version)]($style) "
symbol = " "
style = "bold green"

[python]
format = 'via [$symbol$pyenv_prefix($version)(\($virtualenv\))]($style) '
symbol = " "
style = "bold yellow"

[ruby]
format = "via [$symbol($version)]($style) "
symbol = " "
style = "bold red"

[golang]
format = "via [$symbol($version)]($style) "
symbol = " "
style = "bold cyan"

[rust]
format = "via [$symbol($version)]($style) "
symbol = " "
style = "bold peach"

[java]
format = "via [$symbol($version)]($style) "
symbol = " "
style = "bold red"

# === Kubernetes (shown only when context is set) ===
[kubernetes]
disabled = false
format = 'on [$symbol$context( \($namespace\))]($style) '
symbol = "󱃾 "
style = "bold sky"
detect_files = ["k8s", "*.yaml", "*.yml", "Dockerfile"]

# === SSH username@host (hidden locally, shown when SSH'd) ===
[username]
show_always = false
format = "[$user]($style)@"
style_user = "bold green"

[hostname]
ssh_only = true
format = "[$hostname]($style) in "
style = "bold green"

# === Command duration (shown when > 2s) ===
[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold yellow"

# === Second line ===
[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "✘ "
style = "bold red"
# only rendered when exit code != 0

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold lavender)"

# === Disabled modules ===
[aws]
disabled = true

[gcloud]
disabled = true

# === Catppuccin Mocha palette ===
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
lavender  = "#b4befe"
blue      = "#89b4fa"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"
