# =============================================================================
# General
# =============================================================================

# Prefix: C-a (screen-style, ergonomic on Mac)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Faster key response (essential for Vim ESC)
set -s escape-time 10

# Allow repeatable commands within 1 second
set -g repeat-time 1000

# 1-based indexing (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on   # keep window numbers contiguous when one closes

# Increase scrollback buffer
set -g history-limit 50000

# Propagate window titles to the terminal
set -g set-titles on
set -g set-titles-string "#I: #T"

# Mouse: scroll, click panes, resize by dragging
set -g mouse on

# Focus events — lets Vim know when the terminal gets/loses focus
set -g focus-events on

# Default shell
set -g default-shell /bin/zsh

# =============================================================================
# Color / terminal
# =============================================================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # true color

# =============================================================================
# Navigation & splits
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split with | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind i split-window -h -c "#{pane_current_path}"  # legacy alias

# Open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# =============================================================================
# Activity monitoring
# =============================================================================

setw -g monitor-activity on
set  -g visual-activity off   # catppuccin handles visual feedback

bind m setw monitor-activity
bind M setw monitor-silence 15

# Sync panes (type in all panes at once)
bind s set-window-option synchronize-panes \; display "Sync: #{?synchronize-panes,ON,OFF}"

# =============================================================================
# Catppuccin theme (Mocha)
# =============================================================================

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

set -g @catppuccin_date_time_text "%a %e %b %H:%M"

run "$HOME/Projects/dotfiles/tmux/plugins/catppuccin-tmux/catppuccin.tmux"

# =============================================================================
# Status bar — set AFTER catppuccin so palette variables are available.
# CPU and battery use #(...) directly (not catppuccin modules) because
# catppuccin v2 wraps plugin tokens in #{l:...} which tmux-battery/cpu
# cannot rewrite without TPM.  We call the plugin scripts explicitly instead.
# =============================================================================

BATT="$HOME/Projects/dotfiles/tmux/plugins/tmux-battery/scripts"
CPU="$HOME/Projects/dotfiles/tmux/plugins/tmux-cpu/scripts"
NET="$HOME/Projects/dotfiles/tmux/scripts/net-traffic.sh"

set -g status-position    top
set -g status-left-length  80
set -g status-right-length 200
set -g status-justify      left

set -g  status-left  "#{E:@catppuccin_status_session}"

set -g  status-right "#{E:@catppuccin_status_application}"
set -ag status-right " #[fg=#{@thm_yellow},bg=#{@thm_surface_0}] CPU #($CPU/cpu_percentage.sh)"
set -ag status-right " #[fg=#{@thm_lavender},bg=#{@thm_surface_0}] BAT #($BATT/battery_icon_status.sh)#($BATT/battery_percentage.sh)"
set -ag status-right " #[fg=#{@thm_blue},bg=#{@thm_surface_0}] #($NET)"
set -ag status-right "#{E:@catppuccin_status_date_time}"
